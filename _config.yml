# Hexo Configuration — https://hexo.io/docs/configuration
# Migrated from Jekyll. Theme: Redefine (hexo-theme-redefine).

# Site
title: "Hyacehila's Blog"
subtitle: 'Essays of a Boring Person'
description: 'Essays of a Boring Person'
keywords: 'AI agents, LLM, data science, statistics, machine learning, software engineering, personal blog'
author: Hyacehila
language: en
timezone: Asia/Shanghai

# URL
## Site served at the domain root (user pages repo).
url: https://hyacehila.github.io
root: /
## Preserve legacy Jekyll post URLs. Legacy 104 posts carry an explicit
## per-post `permalink:`; this pattern is only the fallback for future posts.
permalink: /blog/:year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true   # keep .../index.html so output matches Jekyll _site
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - 'assets/**/*.json'   # never let Hexo tag-parse data files
  - 'assets/**/*.js'

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0          # MUST stay 0 — preserves LLM/SOTA/Re0HF case in URLs
render_drafts: false      # drafts stay in repo (source/_drafts) but are NOT published
post_asset_folder: false
relative_link: false
future: true              # all posts are past-dated; render them all
highlight:
  enable: false           # Redefine ships its own highlighter
prismjs:
  enable: false

# Home page index
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
  "Foundation Models": foundation-models
  "Model Mechanics": model-mechanics
  "Training & Alignment": training-alignment
  "Agent Systems": agent-systems
  "Agent Architecture": agent-architecture
  "Agent Evaluation & Governance": agent-evaluation-governance
  "Agent Infrastructure": agent-infrastructure
  "Agent Training": agent-training
  "Data Science & Statistics": data-science-statistics
  "Statistical Thinking": statistical-thinking
  "Statistical Modeling & Inference": statistical-modeling-inference
  "Probability & Statistical Foundations": probability-statistical-foundations
  "Probabilistic Graphical Models": probabilistic-graphical-models
  "Time Series & Spatial Data": time-series-spatial-data
  "Data Practice": data-practice
  "Deep Learning": deep-learning
  "Mathematics": mathematics
  "Mathematical Analysis": mathematical-analysis
  "Algebra & Matrix Theory": algebra-matrix-theory
  "Geometry & Topology": geometry-topology
  "Optimization": optimization
  "Programming": programming
  "Computer Science Fundamentals": computer-science-fundamentals
  "Python": python
  "Web Frontend": web-frontend
  "Data & Databases": data-databases
  "Backend Engineering": backend-engineering
  "R": r
  "C & C++": c-cpp
  "Applied Machine Learning & AutoML": applied-machine-learning-automl
  "Forecasting & Simulation": forecasting-simulation
  "Work & Society": work-society
  "AI Engineering Workflows": ai-engineering-workflows
  "Builder & Product Thinking": builder-product-thinking
  "Career & Learning": career-learning
  "AI & Society": ai-society
  "Creative Media & Games": creative-media-games
  "Game AI & Production": game-ai-production
  "Game Design": game-design
  "Generative Media Tools": generative-media-tools
  "Fiction & Literature": fiction-literature
  "Speculative Fiction": speculative-fiction
  "Science Fiction & Literary Criticism": sci-fi-literature-notes
tag_map:

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: redefine

# Markdown renderer (hexo-renderer-marked)
marked:
  gfm: true
  breaks: false
  prependRoot: true
  postAsset: false
  lazyload: false

# KaTeX (hexo-filter-katex) — build-time LaTeX -> static HTML+CSS (swup-safe,
# stateless, fast). Renders $...$ inline and $$...$$ display on all posts;
# CSS is auto-injected into <head>. The legacy `mathjax: true` front-matter
# flag is harmless/ignored.
katex:
  render_options:
    throwOnError: false
    strict: false

# Local search (hexo-generator-searchdb)
search:
  path: search.xml
  field: post
  content: true
  format: html

# Atom feed (hexo-generator-feed) — replaces jekyll-feed
feed:
  type: atom
  path: feed.xml
  limit: 20
  hub:
  content: true

# Sitemap (hexo-generator-sitemap) — replaces jekyll-sitemap
sitemap:
  path: sitemap.xml
