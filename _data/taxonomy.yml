# 博客分类的唯一来源（single source of truth）。
# 消费方：
#   - blog/index.html        通过 Liquid: site.data.taxonomy.categories
#   - scripts/validate_taxonomy.py  通过 load_taxonomy() 读取本文件
#   - README.md              文档指向本文件，不再重复枚举
#
# 维护方式：新增/调整分类只改这里一处。
# categories 的顺序 = 博客索引页分类按钮的展示顺序。
categories:
  - 基础模型
  - Agent 基础设施
  - Agent 系统
  - 机器学习
  - 数据科学
  - 随笔与观察
  - 小说时间

# 已废弃分类：保留用于校验时给出明确报错，不应再被新文章使用。
deprecated:
  - 统计学
  - 智能体系统
