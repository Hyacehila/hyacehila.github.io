<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hyacehila - Personal Portfolio | Data Scientist & ML Engineer">
  <meta name="keywords" content="Data Science, Machine Learning, Python, Statistics, Portfolio">
  <meta name="author" content="Hyacehila">
  <title>Hyacehila - Personal Portfolio</title>

  <!--
    - favicon
  -->
  <link rel="shortcut icon" href="./assets/images/logo.png" type="image/png">

  <!--
    - custom css link
  -->
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./assets/travelmap/map.css">

  <!--
    - google font link
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!--
    - custom inline styles for translation spans
  -->
  <style>
    /* 确保翻译用的span标签不换行，保持原有的排版 */
    .detail-point span[data-i18n] {
      display: inline;
      color: var(--light-gray);
    }
  </style>
</head>

<body>

  <!--
    - #MAIN
  -->

  <main>

    <!--
      - #main-content
    -->

    <div class="main-content">

      {% include home/navbar.html %}

      {% include home/about.html %}

      {% include home/resume.html %}

      {% include home/portfolio.html %}

      {% include home/contact.html %}

    </div>

  </main>

  <!--
    - custom js link
  -->
  <!-- ECharts for travel map -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/dist/echarts.min.js"></script>

  <script src="./assets/js/script.js"></script>

  <!-- Travel map script -->
  <script src="./assets/travelmap/map.js"></script>

  <!--
    - ionicon link
  -->
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <!--
    - translation script
  -->
  <script>
    // Translation data (来源：_data/i18n/home.json，由 Jekyll 注入；
    // 修改文案请改该数据文件，不要在此硬编码)
    const translations = {{ site.data.i18n.home | jsonify }};

    // Language toggle functionality
    let currentLang = localStorage.getItem('language') || 'en';

    function updateLanguage(lang) {
      currentLang = lang;
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.getElementById('current-lang').textContent = lang.toUpperCase();

      // Update all elements with data-i18n attribute
      document.querySelectorAll('[data-i18n]').forEach(element => {
        const key = element.getAttribute('data-i18n');
        const forcedLangContainer = element.closest('[data-i18n-force-lang]');
        const elementLang = forcedLangContainer ? forcedLangContainer.getAttribute('data-i18n-force-lang') : lang;
        if (translations[elementLang] && translations[elementLang][key]) {
          element.innerHTML = translations[elementLang][key];
        }
      });

      // Save language preference
      localStorage.setItem('language', lang);

      // Update travel map if initialized
      if (typeof window.updateTravelMapLanguage === 'function') {
        window.updateTravelMapLanguage();
      }
    }

    // Language toggle event listener
    document.getElementById('language-toggle').addEventListener('click', () => {
      const newLang = currentLang === 'en' ? 'zh' : 'en';
      updateLanguage(newLang);
    });

    // Initialize language on page load
    updateLanguage(currentLang);
  </script>

</body>

</html>
